<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Contatti | Martina Ria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --base--light: #faf8f8;
      --base-tint--light: #ffffff;
      --base-shade--light: #d9d4d2;
      --t-bright--light: #161616;
      --t-muted--light: #5d5a59;
      --t-opp-bright--light: #ffffff;
      --accent--light: #6298a8;
      --radius-lg: 24px;
      --radius-pill: 999px;
      --max-width: 1120px;
      --nav-height: 68px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f5f1f0 0%, #efebea 100%);
      color: var(--t-bright--light);
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 20px;
    }

    header {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: min(calc(100% - 32px), 760px);
      z-index: 50;
      backdrop-filter: blur(18px);
      border-radius: 999px;
    }

    .nav {
      min-height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 8px 10px 8px 16px;
      border: 1px solid rgba(224, 221, 219, 1);
      background: rgba(255, 255, 255, 0.85);
      border-radius: 999px;
      box-shadow: 0 16px 40px rgba(22, 22, 22, 0.08);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: -0.03em;
      font-size: 18px;
    }

    .nav-logo {
      width: 91px;
      height: auto;
      object-fit: contain;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: var(--t-muted--light);
    }

    .nav-links a {
      padding: 10px 16px;
      border-radius: 999px;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--t-bright--light);
      background: rgba(98, 152, 168, 0.08);
    }

    .nav-links a.is-active {
      background: var(--t-bright--light);
      color: var(--t-opp-bright--light);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      border-radius: var(--radius-pill);
      padding: 13px 22px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease,
        border-color 0.2s ease;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
    }

    .nav-cta {
      background: var(--accent--light);
      color: var(--t-opp-bright--light);
      box-shadow: 0 12px 30px rgba(98, 152, 168, 0.26);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      background: #4f8392;
      box-shadow: 0 18px 40px rgba(98, 152, 168, 0.32);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 64px 0 180px;
    }

    .placeholder {
      width: 100%;
      padding: 64px 0;
    }

    .placeholder-card {
      min-height: 360px;
      border: 1px solid var(--base-shade--light);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 18px 45px rgba(22, 22, 22, 0.05);
    }

    @media (max-width: 900px) {
      header {
        width: min(calc(100% - 24px), 760px);
      }

      .nav {
        gap: 14px;
        padding: 10px 12px;
      }

      .nav-links {
        overflow-x: auto;
        scrollbar-width: none;
      }

      .nav-right {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div data-navbar-root data-current-page="contatti"></div>

    <main id="main-content">
      <section class="placeholder">
        <div class="container">
          <div class="placeholder-card"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="scripts/navbar.js"></script>
</body>
</html>
