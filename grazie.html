<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grazie</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #16A57A;
      --green-dark: #0F7A5A;
      --green-light: #E8F7F2;
      --black: #0A0A0A;
      --text: #1A1A1A;
      --text-mid: #5A5A5A;
      --bg: #F8F7F5;
      --border: #E0DFDD;
      --font: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    /* ---- Stato default (opt-out) ---- */
    .card-default .icon {
      font-size: 2.5rem;
      margin-bottom: 1.25rem;
      line-height: 1;
    }

    .card-default h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #111;
    }

    .card-default p {
      font-size: 1rem;
      line-height: 1.6;
      color: #555;
    }

    /* ---- Stato ScadenzApp ---- */
    .card-scadenzapp { display: none; }

    .check-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .check-circle svg { color: var(--green); }

    .card-scadenzapp h1 {
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.25;
    }

    .card-scadenzapp p {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-mid);
      margin-bottom: 36px;
    }

    .cta-pair {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-green {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--green);
      color: white;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      font-family: var(--font);
      transition: background 0.2s;
    }

    .btn-green:hover { background: var(--green-dark); }

    .btn-black {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--black);
      color: white;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      font-family: var(--font);
      transition: opacity 0.2s;
    }

    .btn-black:hover { opacity: 0.85; }

    .divider {
      font-size: 13px;
      color: var(--text-mid);
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after  { right: 0; }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="dbcdf8fa-70f6-4845-8787-f057298d2dfb"></script>
  <!-- Facebook Pixel Code -->
  <script>!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js'); fbq('init', '4298912547016195'); fbq('track', 'PageView');</script>
  <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=4298912547016195&ev=PageView&noscript=1"/></noscript>
  <!-- End Facebook Pixel Code -->
</head>
<body>
  <!-- Stato default: opt-out -->
  <div class="card card-default" id="card-default">
    <div class="icon">✓</div>
    <h1>Preferenza registrata</h1>
    <p>Grazie per averci fatto sapere. Non riceverà ulteriori comunicazioni su questo argomento.</p>
  </div>

  <!-- Stato ScadenzApp: dopo invio form contatto -->
  <div class="card card-scadenzapp" id="card-scadenzapp">
    <div class="check-circle">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Messaggio ricevuto, grazie!</h1>
    <p>Riceverai una risposta entro 24 ore.<br>Nel frattempo, se vuoi, puoi già dare un'occhiata a ScadenzApp</p>
    <div class="cta-pair">
      <a class="btn-green" href="https://scadenzapp.base44.app/" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Scopri ScadenzApp
      </a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const motivo = params.get('motivo') || '';

    if (motivo === 'invio_form_scadenzapp') {
      document.title = 'Messaggio ricevuto – ScadenzApp';
      document.getElementById('card-default').style.display = 'none';
      document.getElementById('card-scadenzapp').style.display = 'block';
      fbq('track', 'Contact', { content_name: 'ScadenzApp', content_category: 'form' });
    }
  </script>
</body>
</html>
