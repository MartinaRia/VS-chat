<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grazie</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon {
      font-size: 2.5rem;
      margin-bottom: 1.25rem;
      line-height: 1;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #111;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #555;
    }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="dbcdf8fa-70f6-4845-8787-f057298d2dfb"></script>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Preferenza registrata</h1>
    <p>Grazie per averci fatto sapere. Non riceverà ulteriori comunicazioni su questo argomento.</p>
  </div>
  <script>
    // reads ?motivo= for potential server-side use; no value is rendered to the page
    const params = new URLSearchParams(window.location.search);
    const motivo = params.get('motivo') || '';
    if (motivo) {
      document.title = 'Grazie';
    }
  </script>
</body>
</html>
